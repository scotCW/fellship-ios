name: "CodeQL"

# Swift is a compiled language, so CodeQL must actually build the app to
# create its analysis database. Autobuild can't drive an Xcode project with
# an SPM dependency and a shared scheme, so this workflow uses manual build
# mode with explicit xcodebuild steps.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Weekly, so new CodeQL rules catch issues even without a push.
    - cron: "0 6 * * 1"

jobs:
  analyze:
    name: Analyze (Swift)
    # Swift requires a macOS runner. Note: macOS minutes bill at 10x on
    # private repos — see the trigger note above if you need to economize.
    runs-on: macos-15
    timeout-minutes: 120
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show toolchain
        run: xcodebuild -version && swift --version

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift
          build-mode: manual

      - name: Resolve Swift package dependencies
        run: >
          xcodebuild -resolvePackageDependencies
          -project Fellship.xcodeproj
          -scheme Fellship

      # A *clean* build is important: CodeQL only records files it sees
      # compiled, so an incremental/cached build would yield an empty database.
      - name: Build for CodeQL (simulator, no signing)
        run: >
          xcodebuild clean build
          -project Fellship.xcodeproj
          -scheme Fellship
          -configuration Debug
          -destination 'generic/platform=iOS Simulator'
          CODE_SIGNING_ALLOWED=NO
          CODE_SIGNING_REQUIRED=NO
          CODE_SIGN_IDENTITY=""

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:swift"
